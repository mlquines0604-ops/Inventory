<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Contact Us - BorrowSmart</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="bg-layer">
  <div class="bg-gradient"></div>
  <div class="bg-grid"></div>
  <div class="bg-orb bg-orb-1"></div>
  <div class="bg-orb bg-orb-2"></div>
</div>

<header class="header">
  <a href="index.html" class="logo">
    <div class="logo-icon">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 5.25a3 3 0 013 3m3 0a6 6 0 01-7.029 5.912c-.563-.097-1.159.026-1.563.43L10.5 17.25H8.25v2.25H6v2.25H2.25v-2.818c0-.597.237-1.17.659-1.591l6.499-6.499c.404-.404.527-1 .43-1.563A6 6 0 1121.75 8.25z" />
      </svg>
    </div>
    BorrowSmart
  </a>
  <button class="mobile-menu-btn" aria-label="Toggle menu">
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5" />
    </svg>
  </button>
  <nav class="nav-links">
    <a href="index.html">Home</a>
    <a href="solutions.html">Solutions</a>
    <a href="about.html">About</a>
    <a href="contact.html" class="active">Contact</a>
    <a href="admin.html" class="nav-admin">Admin</a>
  </nav>
</header>

<div class="mobile-nav">
  <a href="index.html">Home</a>
  <a href="solutions.html">Solutions</a>
  <a href="about.html">About</a>
  <a href="contact.html" class="active">Contact</a>
  <a href="admin.html">Admin</a>
</div>

<div class="container container-wide">
  <div class="page-hero">
    <h1>Get In Touch</h1>
    <p>Have questions? We'd love to hear from you. Send us a message and we'll respond as soon as possible.</p>
  </div>

  <div class="contact-grid">
    <div class="card animate-in animate-in-1">
      <h3 style="font-family: 'Space Grotesk', sans-serif; font-size: 20px; margin-bottom: 24px;">Send us a message</h3>
      <form id="contactForm" onsubmit="handleSubmit(event)">
        <div class="form-group">
          <label for="name">Full Name</label>
          <input type="text" id="name" placeholder="Lesbet Quines" required>
        </div>
        <div class="form-group">
          <label for="message">Message</label>
          <textarea id="message" placeholder="Tell us how we can help..." required></textarea>
        </div>
        <button type="submit" class="btn-primary" style="width: 100%;">
          Send Message
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" style="width: 20px; height: 20px;">
            <path stroke-linecap="round" stroke-linejoin="round" d="M6 12L3.269 3.126A59.768 59.768 0 0121.485 12 59.77 59.77 0 013.27 20.876L5.999 12zm0 0h7.5" />
          </svg>
        </button>
      </form>
    </div>
    
    <div class="contact-info animate-in animate-in-2">
      <div class="contact-item">
        <div class="contact-item-icon">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 6.75c0 8.284 6.716 15 15 15h2.25a2.25 2.25 0 002.25-2.25v-1.372c0-.516-.351-.966-.852-1.091l-4.423-1.106c-.44-.11-.902.055-1.173.417l-.97 1.293c-.282.376-.769.542-1.21.38a12.035 12.035 0 01-7.143-7.143c-.162-.441.004-.928.38-1.21l1.293-.97c.363-.271.527-.734.417-1.173L6.963 3.102a1.125 1.125 0 00-1.091-.852H4.5A2.25 2.25 0 002.25 4.5v2.25z" />
          </svg>
        </div>
        <div>
          <h4>Call Us</h4>
          <p>+63 932 419 1412</p>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Success Popup -->
<div id="successPopup" class="popup">
  <div class="popupContent">
    <div style="width: 64px; height: 64px; background: rgba(16, 185, 129, 0.2); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 16px;">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="var(--success)" style="width: 32px; height: 32px;">
        <path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5" />
      </svg>
    </div>
    <h3>Message Sent</h3>
    <button class="btn-primary" style="width: 100%; margin-top: 20px;" onclick="closeSuccessPopup()">Got it</button>
  </div>
</div>

<script src="main.js"></script>
<script>
function handleSubmit(e) {
  e.preventDefault();
  
  const name = document.getElementById('name').value;
  const message = document.getElementById('message').value;
  
  // 1. Save message to localStorage for the Admin page
  const newMessage = {
    id: Date.now(),
    name: name,
    message: message,
    date: new Date().toLocaleString()
  };
  
  let messages = JSON.parse(localStorage.getItem('borrowSmartMessages')) || [];
  messages.unshift(newMessage); // Add to top of list
  localStorage.setItem('borrowSmartMessages', JSON.stringify(messages));

  // 2. Open SMS App (Original functionality)
  const smsBody = `Name: ${name}%0AMessage: ${message}`;
  window.location.href = `sms:+639324191412?body=${smsBody}`;
  
  // 3. Show UI Feedback
  document.getElementById('successPopup').classList.add('active');
  document.getElementById('contactForm').reset();
}

function closeSuccessPopup() {
  document.getElementById('successPopup').classList.remove('active');
}

// Close popup when clicking outside
document.getElementById('successPopup').addEventListener('click', function(e) {
  if (e.target === this) {
    closeSuccessPopup();
  }
});

// Keyboard accessibility
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') {
    closeSuccessPopup();
  }
});
</script>
</body>
</html>
