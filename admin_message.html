<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Admin Messages - BorrowSmart</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="bg-layer">
  <div class="bg-gradient"></div>
  <div class="bg-grid"></div>
  <div class="bg-orb bg-orb-1"></div>
  <div class="bg-orb bg-orb-2"></div>
</div>

<header class="header">
  <a href="index.html" class="logo">
    <div class="logo-icon">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 5.25a3 3 0 013 3m3 0a6 6 0 01-7.029 5.912c-.563-.097-1.159.026-1.563.43L10.5 17.25H8.25v2.25H6v2.25H2.25v-2.818c0-.597.237-1.17.659-1.591l6.499-6.499c.404-.404.527-1 .43-1.563A6 6 0 1121.75 8.25z" />
      </svg>
    </div>
    BorrowSmart
  </a>
  <button class="mobile-menu-btn" aria-label="Toggle menu">
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5" />
    </svg>
  </button>
  <nav class="nav-links" id="mainNav">
    <!-- Injected by JS -->
  </nav>
</header>

<div class="mobile-nav" id="mobileNav">
  <!-- Injected by JS -->
</div>

<div class="container container-wide">
  <div class="page-hero">
    <h1>Admin Inbox</h1>
    <p>Messages submitted via the contact form appear here.</p>
  </div>

  <div class="section">
    <div class="card animate-in" style="max-width: 900px; margin: 0 auto;">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
        <h3 style="font-family: 'Space Grotesk', sans-serif; font-size: 20px;">Submissions</h3>
        <button class="btn-secondary" onclick="clearMessages()" style="padding: 8px 16px; font-size: 13px;">
          Clear All
        </button>
      </div>
      
      <div id="messagesContainer">
        <!-- Messages will be injected here by JavaScript -->
      </div>
    </div>
  </div>
</div>

  <script src="main.js"></script>
<script>
// Auth Check & Nav Update
(function() {
  const isLoggedIn = localStorage.getItem("adminLoggedIn") === "true";
  const nav = document.getElementById("mainNav");
  const mobileNav = document.getElementById("mobileNav");

  if (!isLoggedIn) {
    window.location.href = "admin.html"; // Redirect if not logged in
  } else {
    // Set Admin Nav
    nav.innerHTML = `
      <a href="index.html">Home</a>
      <a href="admin_message.html" class="active">Messages</a>
      <a href="#" onclick="logout()" class="nav-admin">Logout</a>
    `;
    mobileNav.innerHTML = nav.innerHTML;
  }
})();

function logout() {
  localStorage.removeItem("adminLoggedIn");
  window.location.href = "admin.html";
}

function loadMessages() {
  const container = document.getElementById('messagesContainer');
  const messages = JSON.parse(localStorage.getItem('borrowSmartMessages')) || [];

  if (messages.length === 0) {
    container.innerHTML = `
      <div style="text-align: center; padding: 40px 20px; color: var(--fg-muted);">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" style="width: 48px; height: 48px; margin-bottom: 16px; opacity: 0.5;">
          <path stroke-linecap="round" stroke-linejoin="round" d="M21.75 9v.906a2.25 2.25 0 01-1.183 1.981l-6.478 3.488M2.25 9v.906a2.25 2.25 0 001.183 1.981l6.478 3.488m8.839 2.51l-4.66-2.51m0 0l-1.023-.55a2.25 2.25 0 00-2.134 0l-1.022.55m0 0l-4.661 2.51m16.5 1.615a2.25 2.25 0 01-2.25 2.25h-15a2.25 2.25 0 01-2.25-2.25V8.844a2.25 2.25 0 011.183-1.98l7.5-4.04a2.25 2.25 0 012.134 0l7.5 4.04a2.25 2.25 0 011.183 1.98V17.5z" />
        </svg>
        <p>No messages yet.</p>
      </div>
    `;
    return;
  }

  let html = '';
  messages.forEach(msg => {
    html += `
      <div class="message-item" style="background: rgba(0,0,0,0.2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 16px; margin-bottom: 12px;">
        <div style="display: flex; justify-content: space-between; margin-bottom: 8px;">
          <strong style="color: var(--accent);">${escapeHtml(msg.name)}</strong>
          <span style="font-size: 12px; color: var(--fg-muted);">${msg.date}</span>
        </div>
        <p style="color: var(--fg); line-height: 1.5;">${escapeHtml(msg.message)}</p>
        <button onclick="deleteMessage(${msg.id})" style="margin-top: 12px; background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.3); color: var(--danger); padding: 4px 12px; border-radius: 6px; font-size: 12px; cursor: pointer;">
          Delete
        </button>
      </div>
    `;
  });

  container.innerHTML = html;
}

function escapeHtml(text) {
  if (!text) return text;
  return text
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#039;");
}

function deleteMessage(id) {
  let messages = JSON.parse(localStorage.getItem('borrowSmartMessages')) || [];
  messages = messages.filter(m => m.id !== id);
  localStorage.setItem('borrowSmartMessages', JSON.stringify(messages));
  loadMessages();
}

function clearMessages() {
  if (confirm('Are you sure you want to delete all messages?')) {
    localStorage.removeItem('borrowSmartMessages');
    loadMessages();
  }
}

// Initial load
loadMessages();
</script>
</body>
</html>
